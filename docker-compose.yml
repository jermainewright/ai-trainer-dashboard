version: '3.9'
services:
  api:
    build:
      context: ./apps/api
    env_file: .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - ./uploads:/app/uploads
      - ./artifacts:/app/artifacts

  web:
    build:
      context: ./apps/web
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/usr/src/app
    depends_on:
      - api
